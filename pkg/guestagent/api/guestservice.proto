syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/lima-vm/lima/v2/pkg/guestagent/api";

service GuestService {
  rpc GetInfo(google.protobuf.Empty) returns (Info);
  rpc GetEvents(google.protobuf.Empty) returns (stream Event);
  rpc PostInotify(stream Inotify) returns (google.protobuf.Empty);

  rpc Tunnel(stream TunnelMessage) returns (stream TunnelMessage);
  rpc SyncTime(TimeSyncRequest) returns (TimeSyncResponse);

  // GetMemoryMetrics returns current guest memory metrics for the balloon controller.
  rpc GetMemoryMetrics(google.protobuf.Empty) returns (MemoryMetrics);
}

message Info {
  repeated IPPort local_ports = 1;
}

message Event {
  google.protobuf.Timestamp time = 1;
  repeated IPPort added_local_ports = 2;
  repeated IPPort removed_local_ports = 3;
  repeated string errors = 4;
}

message IPPort {
  string protocol = 1; // tcp, udp
  string ip = 2;
  int32 port = 3;
}

message Inotify {
  string mount_path = 1;
  google.protobuf.Timestamp time = 2;
}

message TunnelMessage {
  string id = 1;
  string protocol = 2; // tcp, udp
  bytes data = 3;
  string guest_addr = 4;
  string udp_target_addr = 5;
}

message TimeSyncRequest {
  google.protobuf.Timestamp host_time = 1;
}

message TimeSyncResponse {
  bool adjusted = 1;
  int64 drift_ms = 2;
  string error = 3;
}

// MemoryMetrics contains guest memory statistics for the balloon controller.
message MemoryMetrics {
  // /proc/meminfo fields (bytes).
  uint64 mem_total_bytes = 1;
  uint64 mem_available_bytes = 2;
  uint64 mem_cached_bytes = 3;
  uint64 swap_total_bytes = 4;
  uint64 swap_free_bytes = 5;
  uint64 anon_rss_bytes = 6;

  // /proc/pressure/memory PSI values (percentage 0.0-100.0 over 10s window).
  double psi_memory_some_10 = 7;
  double psi_memory_full_10 = 8;

  // /proc/vmstat deltas (bytes/sec, computed by agent between polls).
  double swap_in_bytes_per_sec = 9;
  double swap_out_bytes_per_sec = 10;
  double page_fault_rate = 11;

  // Container activity.
  int32 container_count = 12;
  double container_cpu_percent = 13;
  // Container I/O rate in bytes per second across all containers.
  double container_io_bytes_per_sec = 14;

  // OOM detection (edge-triggered: set once, cleared after reporting).
  bool oom_detected = 15;

  // /proc/pressure/memory PSI values (percentage 0.0-100.0 over 60s window).
  double psi_memory_some_60 = 16;
  double psi_memory_full_60 = 17;
}
