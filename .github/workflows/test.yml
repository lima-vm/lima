name: test

on:
  push:
    branches:
    - master
    - 'release/**'
    paths-ignore:
    - "docs/**"
    - "website/**"
    - "**.md"
  pull_request:
    paths-ignore:
    - "docs/**"
    - "website/**"
    - "**.md"
env:
  LIMACTL_CREATE_ARGS: ""
  GOTOOLCHAIN: local

permissions:
  contents: read

jobs:
  lints:
    name: "Lints"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Install protoc and Go plugins
      run: |
        sudo apt-get update
        sudo apt-get install -y protobuf-compiler
        make install-protoc-tools
    - name: Verify generated files
      run: make generate check-generated
    - name: Run nobin
      run: >-
        go tool -modfile=./hack/tools/go.mod nobin
        --allow-emoji
        --allow-escape
        --gitignore
        --skip-ext pb.desc
        --skip 'website/static/images/**/*.{gif,png}'
        --skip 'docs/reports/**/*.pdf'
    - name: Run editorconfig-checker
      run: go tool -modfile=./hack/tools/go.mod editorconfig-checker
    - name: Run yamllint
      run: yamllint .
    - name: Install shellcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y shellcheck
    - name: Run file and directory name linter
      uses: ls-lint/action@02e380fe8733d499cbfc9e22276de5085508a5bd  # v2.3.1
    - name: Run shellcheck
      run: find . -name '*.sh' | xargs shellcheck
    - name: Run shfmt
      run: find . -name '*.sh' | xargs go tool -modfile=./hack/tools/go.mod shfmt -s -d
    - name: Check hyperlinks
      uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
      with:
        args: >-
          --exclude https://img.shields.io
          --exclude http://127.0.0.1:8080
          --exclude https://github.com/lima-vm/lima/releases/download
          --exclude https://xbarapp.com
          --exclude https://api.github.com
          README.md
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Install go-licenses
      # TODO: move to `go tool` after upgrading to v2
      run: go install github.com/google/go-licenses@v1.6.0
    - name: Check licenses
      # the allow list corresponds to https://github.com/cncf/foundation/blob/e5db022a0009f4db52b89d9875640cf3137153fe/allowed-third-party-license-policy.md
      # hashicorp/hcl/v2 is MPL-2.0; covered by the CNCF license exception for hashicorp/hcl
      # see also https://github.com/cncf/foundation/issues/1242
      run: go-licenses check --include_tests --ignore github.com/hashicorp/hcl/v2 ./... --allowed_licenses=$(cat ./hack/allowed-licenses.txt)
    - name: Check license boilerplates
      run: go tool -modfile=./hack/tools/go.mod ltag -t ./hack/ltag --check -v
    - name: Check protobuf files
      run: go tool -modfile=./hack/tools/go.mod protolint .
    - name: Run zizmor
      uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e  # v0.5.3
      with:
        # No need to hide the result in https://github.com/lima-vm/lima/security (private),
        # as anybody can already run zizmor locally to find vulnerabilities.
        # https://github.com/lima-vm/lima/pull/4846#pullrequestreview-4135088525
        advanced-security: false

  lint-go:
    name: "Lint Go"
    timeout-minutes: 30
    strategy:
      matrix:
        runs-on: [ubuntu-24.04, macos-26, windows-2025]
    runs-on: ${{ matrix.runs-on }}
    steps:
    - name: Force git to use LF
      # This step is required on Windows to work around golangci-lint issues with formatters. See https://github.com/golangci/golangci-lint/discussions/5840
      # TODO: replace with a checkout option when https://github.com/actions/checkout/issues/226 is implemented
      if: runner.os == 'Windows'
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - id: golangci-lint-version
      shell: bash
      working-directory: hack/tools
      run: |
        echo "GOLANGCI_LINT_VERSION=$(go list -m -f '{{.Version}}' github.com/golangci/golangci-lint/v2)" >> $GITHUB_OUTPUT
    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
      with:
        version: ${{ steps.golangci-lint-version.outputs.GOLANGCI_LINT_VERSION }}
        args: --verbose

  security:
    name: "Vulncheck"
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
    - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee  # v1.0.4

  unit:
    name: "Unit tests"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # For non-Homebrew we have to support an old release of Go
        go-version: ["oldstable", "stable"]
    steps:
    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends qemu-utils
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: ${{ matrix.go-version }}
        cache: false
    - name: Unit tests
      run: go test -v ./...
    - name: Make
      run: make
    - name: Install
      run: sudo make install
    - name: Verify templates match `limactl edit` format
      run: |
        find templates -name '*.yaml' -exec limactl edit --set 'del(.nothing)' {} \;
        git diff-index --exit-code HEAD
    - name: Uninstall
      run: sudo make uninstall

  windows:
    name: "Windows tests (WSL2)"
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
    - name: Enable WSL2
      run: |
        wsl --set-default-version 2
        wsl --shutdown
        wsl --update
        wsl --status
        wsl --version
        wsl --list --online
    - name: Install WSL2 distro
      timeout-minutes: 1
      run: |
        # FIXME: At least one distro has to be installed here,
        # otherwise `wsl --list --verbose` (called from Lima) fails:
        # https://github.com/lima-vm/lima/pull/1826#issuecomment-1729993334
        # The distro image itself is not consumed by Lima.
        # Starting with WSL2 version 2.5.7.0 the distro will be rejected
        # if it doesn't contain /bin/sh and /etc.
        # ------------------------------------------------------------------
        mkdir dummy
        mkdir dummy\bin
        mkdir dummy\etc
        echo "" >dummy\bin\sh
        tar -cf dummy.tar --format ustar -C dummy .
        wsl --import dummy $env:TEMP dummy.tar
        wsl --list --verbose
    - name: Set gitconfig
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Unit tests
      run: go test -v ./...
    - name: Make
      run: make
    - name: Integration tests (WSL2, Windows host)
      run: |
        $env:PATH = "$pwd\_output\bin;" + 'C:\msys64\usr\bin;' + $env:PATH
        pacman -Sy --noconfirm openbsd-netcat diffutils socat w3m
        $env:MSYS2_ENV_CONV_EXCL = 'HOME_HOST;HOME_GUEST'
        $env:HOME_HOST = $(cygpath.exe "$env:USERPROFILE")
        $env:HOME_GUEST = "/mnt$env:HOME_HOST"
        $env:LIMACTL_CREATE_ARGS = '--vm-type=wsl2 --mount-type=wsl2 --containerd=system'
        bash.exe -c "./hack/test-templates.sh templates/experimental/wsl2.yaml"

  windows-qemu:
    name: "Windows tests (QEMU)"
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
    - name: Set gitconfig
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: Install QEMU
      run: |
        # Pin to 10.2.0: QEMU 11.0.0 TCG breaks systemd boot on the Windows
        # runner with "Failed to fork off sandboxing environment: Protocol
        # error", blocking SSH.
        winget install --silent --accept-source-agreements --accept-package-agreements --disable-interactivity SoftwareFreedomConservancy.QEMU --version 10.2.0
    - name: Integration tests (QEMU, Windows host)
      run: |
        $env:PATH = "$pwd\_output\bin;" + 'C:\msys64\usr\bin;' + 'C:\Program Files\QEMU;' + $env:PATH
        pacman -Sy --noconfirm openbsd-netcat diffutils socat w3m
        $env:MSYS2_ENV_CONV_EXCL = 'HOME_HOST;HOME_GUEST'
        $env:HOME_HOST = $(cygpath.exe "$env:USERPROFILE")
        $env:HOME_GUEST = "$env:HOME_HOST"
        $env:LIMACTL_CREATE_ARGS = '--vm-type=qemu'
        bash.exe -c "./hack/test-templates.sh templates/default.yaml"

  windows-plain-wsl2:
    # Smoke test that Lima's WSL2 driver works on a Windows host with only
    # the bits that ship in a default Windows 10/11 install (native OpenSSH,
    # wsl.exe, tar). Notably: no Git for Windows, no MSYS2, no cygpath, no
    # Cygwin/MSYS2 ssh. Builds with `go build` (instead of `make`) and
    # exercises the main commands in PowerShell. If this job ever needs to
    # add MSYS2 / Git for Windows back to make a step pass, that means a new
    # external-binary dependency was introduced and should be evaluated.
    name: "Windows tests (plain WSL2, no MSYS2 / Git for Windows)"
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
    - name: Enable WSL2
      run: |
        wsl --set-default-version 2
        wsl --shutdown
        wsl --update
        wsl --status
    - name: Install WSL2 distro
      timeout-minutes: 1
      run: |
        # See the windows-wsl2 job for why this dummy distro exists.
        mkdir dummy
        mkdir dummy\bin
        mkdir dummy\etc
        echo "" >dummy\bin\sh
        tar -cf dummy.tar --format ustar -C dummy .
        wsl --import dummy $env:TEMP dummy.tar
        wsl --list --verbose
    - name: Set gitconfig
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Build limactl and Linux/amd64 guest agent
      # Avoid `make` so the build does not require MSYS2 make / bash. The
      # guest agent must be built separately because limactl looks it up at
      # the path _output/share/lima/lima-guestagent.<OS>-<arch> when starting
      # an instance, and `go build ./cmd/limactl` does not produce that file.
      run: |
        $ErrorActionPreference = 'Stop'
        go build -o _output\bin\limactl.exe .\cmd\limactl
        if ($LASTEXITCODE -ne 0) { throw "limactl build failed: $LASTEXITCODE" }
        New-Item -ItemType Directory -Force -Path _output\share\lima | Out-Null
        $env:CGO_ENABLED = '0'
        $env:GOOS = 'linux'
        $env:GOARCH = 'amd64'
        go build -o _output\share\lima\lima-guestagent.Linux-x86_64 .\cmd\lima-guestagent
        if ($LASTEXITCODE -ne 0) { throw "lima-guestagent build failed: $LASTEXITCODE" }
    - name: Scrub PATH and verify only native Windows toolchain is reachable
      run: |
        $ErrorActionPreference = 'Stop'
        Write-Host "PATH before scrub:"
        $env:PATH -split ';' | ForEach-Object { Write-Host "  $_" }
        # Scrub PATH of Cygwin/MSYS2/Git-for-Windows toolchains so that
        # limactl is forced to use native Windows binaries only. The
        # GitHub runner image has these pre-installed and on PATH by
        # default; we want to simulate a vanilla Windows host where
        # users have not installed Git for Windows or MSYS2.
        $scrubbed = ($env:PATH -split ';' | Where-Object {
          $_ -notmatch '\\msys(64|2)\\' -and
          $_ -notmatch '\\Git\\(usr|mingw\d+)\\bin' -and
          $_ -notmatch '\\Git\\cmd' -and
          $_ -notmatch '\\Git\\bin' -and
          $_ -notmatch '\\cygwin\d*\\'
        }) -join ';'
        # Persist the scrubbed PATH into subsequent steps so the smoke test
        # and any post-step diagnostics see the same environment.
        Add-Content -Path $env:GITHUB_ENV -Value "PATH=$scrubbed"
        $env:PATH = $scrubbed
        Write-Host ""
        Write-Host "PATH after scrub:"
        $env:PATH -split ';' | ForEach-Object { Write-Host "  $_" }
        Write-Host ""
        # Required: ssh must be the native Windows OpenSSH binary, since
        # that is the toolchain we are exercising.
        $sshSrc = (Get-Command ssh).Source
        Write-Host "ssh resolves to: $sshSrc"
        if ($sshSrc -notlike 'C:\Windows\System32\OpenSSH\ssh.exe') {
          Write-Error "Expected native Windows OpenSSH; got $sshSrc"
          exit 1
        }
        # Tool inventory: print the resolved location of every external binary
        # Lima might shell out to on Windows, so the workflow log captures the
        # exact toolchain layout the test ran against. Tools split into:
        #   required-native: must come from C:\Windows or be a built-in like wsl.
        #   forbidden: must NOT resolve at all on a "plain Windows" host.
        #   optional: may or may not be present; logged for context. Lima has
        #             graceful fallbacks (id, rsync) or only needs them for
        #             non-default code paths (qemu-img, decompressors).
        $required = @('ssh','scp','ssh-keygen','sftp-server','wsl','tar')
        $forbidden = @{
          'cygpath' = 'cygpath comes from MSYS2/Git-for-Windows/Cygwin only'
          'pacman'  = 'pacman comes from MSYS2 only'
        }
        # bash.exe is interesting but ambiguous: Windows 10/11 ship a WSL
        # launcher named bash.exe in System32, which is fine. Git for Windows
        # also ships a bash.exe in usr/bin. Log it but do not fail on it.
        $optional = @('bash','sh','gzip','bzip2','xz','zstd','rsync','id','make','awk','sed','qemu-img')

        Write-Host ""
        Write-Host "=== Required tools (must resolve) ==="
        $missingRequired = @()
        foreach ($cmd in $required) {
          $found = Get-Command $cmd -ErrorAction SilentlyContinue
          if ($found) { Write-Host ("  {0,-15} -> {1}" -f $cmd, $found.Source) }
          else { Write-Host ("  {0,-15} -> NOT FOUND" -f $cmd); $missingRequired += $cmd }
        }
        Write-Host ""
        Write-Host "=== Forbidden tools (must not resolve on plain Windows) ==="
        $foundForbidden = @()
        foreach ($cmd in $forbidden.Keys) {
          $found = Get-Command $cmd -ErrorAction SilentlyContinue
          if ($found) {
            Write-Host ("  {0,-15} -> {1}    (FORBIDDEN: {2})" -f $cmd, $found.Source, $forbidden[$cmd])
            $foundForbidden += $cmd
          } else {
            Write-Host ("  {0,-15} -> not found (good)" -f $cmd)
          }
        }
        Write-Host ""
        Write-Host "=== Optional tools (logged for context, not asserted) ==="
        foreach ($cmd in $optional) {
          $found = Get-Command $cmd -ErrorAction SilentlyContinue
          if ($found) { Write-Host ("  {0,-15} -> {1}" -f $cmd, $found.Source) }
          else { Write-Host ("  {0,-15} -> not found" -f $cmd) }
        }
        Write-Host ""
        if ($missingRequired.Count -gt 0) {
          Write-Error ("Required tools not on PATH: " + ($missingRequired -join ', '))
          exit 1
        }
        if ($foundForbidden.Count -gt 0) {
          Write-Error ("Forbidden tools still on PATH: " + ($foundForbidden -join ', ') + ". Update the scrub regex in this step.")
          exit 1
        }
    - name: Smoke test (create / start / shell / copy / stop / delete)
      env:
        # Surface decisions in path-translation, ssh-args, mux-stripping, etc.
        # The Debug-level logging is only useful when this job fails, but the
        # success-case noise is small and CI logs are kept for a long time.
        LIMA_HOME: ${{ runner.temp }}\lima-plain-wsl2
      run: |
        $ErrorActionPreference = 'Stop'
        # Wrap each limactl invocation so a non-zero exit aborts the whole
        # script. Without this, $ErrorActionPreference does not catch native
        # command failures and the script silently continues past errors.
        function Invoke-Limactl {
          & .\_output\bin\limactl.exe --debug @args
          if ($LASTEXITCODE -ne 0) { throw "limactl $($args -join ' ') exited $LASTEXITCODE" }
        }
        if (Test-Path $env:LIMA_HOME) { Remove-Item $env:LIMA_HOME -Recurse -Force }
        New-Item -ItemType Directory -Path $env:LIMA_HOME | Out-Null
        # Use the same WSL2 rootfs template that windows-wsl2 uses, so this
        # job exercises a real boot rather than the smallest synthetic config.
        Invoke-Limactl create --tty=false --name=plain .\templates\experimental\wsl2.yaml
        Invoke-Limactl start plain
        Invoke-Limactl shell --tty=false plain -- uname -srm
        'roundtrip' | Out-File -Encoding ascii "$env:LIMA_HOME\rt.txt"
        Invoke-Limactl copy "$env:LIMA_HOME\rt.txt" plain:/tmp/rt.txt
        Invoke-Limactl shell --tty=false plain -- cat /tmp/rt.txt
        Invoke-Limactl stop plain
        Invoke-Limactl delete --force plain
    - name: Dump Lima logs on failure
      if: failure()
      env:
        LIMA_HOME: ${{ runner.temp }}\lima-plain-wsl2
      run: |
        # Hostagent logs are the most useful artefact when start fails.
        # Print everything Lima wrote about the instance so failures show up
        # in the workflow run instead of being lost when the runner is gone.
        $instDir = "$env:LIMA_HOME\plain"
        if (-not (Test-Path $instDir)) {
          Write-Host "No instance directory at $instDir, nothing to dump."
          exit 0
        }
        Get-ChildItem $instDir | Format-Table Name, Length, LastWriteTime
        foreach ($name in 'ha.stdout.log','ha.stderr.log','serial.log','lima.yaml','ssh.config') {
          $p = Join-Path $instDir $name
          if (Test-Path $p) {
            Write-Host ("===== {0} =====" -f $p)
            Get-Content $p
          }
        }

  windows-plain-qemu:
    # Same shape as windows-plain-wsl2 but exercises the QEMU driver, which
    # uses reverse-sshfs for host mounts. With the host's PATH scrubbed of
    # Cygwin/MSYS2/Git-for-Windows entries, sshocker auto-detects the
    # native Windows sftp-server (C:\Windows\System32\OpenSSH\sftp-server.exe)
    # and Lima feeds it forward-slash native paths. The smoke test verifies
    # the mount actually works end-to-end (write on host, read in guest) so
    # we know that the test-templates.sh "mount-home" check, which now also
    # runs in windows-qemu via the MSYS2 toolchain, has a parallel test on
    # the plain-Windows side.
    name: "Windows tests (plain QEMU, no MSYS2 / Git for Windows)"
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
    - name: Set gitconfig
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Install QEMU
      run: |
        # Pin to 10.2.0; see windows-qemu for the rationale.
        winget install --silent --accept-source-agreements --accept-package-agreements --disable-interactivity SoftwareFreedomConservancy.QEMU --version 10.2.0
    - name: Build limactl and Linux/amd64 guest agent
      run: |
        $ErrorActionPreference = 'Stop'
        go build -o _output\bin\limactl.exe .\cmd\limactl
        if ($LASTEXITCODE -ne 0) { throw "limactl build failed: $LASTEXITCODE" }
        New-Item -ItemType Directory -Force -Path _output\share\lima | Out-Null
        $env:CGO_ENABLED = '0'
        $env:GOOS = 'linux'
        $env:GOARCH = 'amd64'
        go build -o _output\share\lima\lima-guestagent.Linux-x86_64 .\cmd\lima-guestagent
        if ($LASTEXITCODE -ne 0) { throw "lima-guestagent build failed: $LASTEXITCODE" }
    - name: Install templates (replicating make's TEMPLATES target)
      # The default.yaml template uses `base: template:_images/ubuntu` and
      # `base: template:_default/mounts`, which Lima resolves via
      # <prefix>/share/lima/templates/. We avoid `make` to stay free of MSYS2,
      # so we copy templates/ to _output/share/lima/templates/ ourselves.
      #
      # Wrinkle: several files under templates/ are git symlinks
      # (mode 120000) pointing at sibling files. The Windows checkout writes
      # them as plaintext stubs containing just the target filename, because
      # core.symlinks defaults to false on Windows. Some symlinks chain
      # (opensuse.yaml -> opensuse-leap.yaml -> opensuse-leap-16.yaml), so
      # the resolver follows the chain until it lands on a real blob.
      run: |
        $ErrorActionPreference = 'Stop'
        $srcRoot = 'templates'
        $dstRoot = '_output\share\lima\templates'
        if (Test-Path $dstRoot) { Remove-Item $dstRoot -Recurse -Force }
        New-Item -ItemType Directory -Force -Path $dstRoot | Out-Null
        Copy-Item -Path "$srcRoot\*" -Destination $dstRoot -Recurse -Force

        # Build a set of paths git tracks as symlinks, keyed by Windows-style path.
        $stubPaths = @{}
        foreach ($line in (git ls-tree -r HEAD $srcRoot)) {
          if ($line -match '^120000\s') {
            $relPath = ($line -split "`t", 2)[1]
            $stubPaths[$relPath -replace '/', '\'] = $true
          }
        }
        if ($LASTEXITCODE -ne 0) { throw "git ls-tree failed: $LASTEXITCODE" }

        function Resolve-StubChain($path) {
          $depth = 0
          while ($stubPaths[$path]) {
            if ($depth++ -gt 16) { throw "Symlink chain too deep starting from $path" }
            $target = (Get-Content -Raw $path).Trim()
            $next = Join-Path (Split-Path $path) $target
            if (-not (Test-Path $next)) {
              throw "Stub $path points at $target which does not exist at $next"
            }
            $path = $next
          }
          return $path
        }

        foreach ($stub in $stubPaths.Keys) {
          $real = Resolve-StubChain $stub
          $dstPath = Join-Path '_output\share\lima' $stub
          Write-Host "Resolving symlink: $stub -> $real"
          Copy-Item -Force -Path $real -Destination $dstPath
        }
    - name: Scrub PATH and verify only native Windows toolchain is reachable
      run: |
        $ErrorActionPreference = 'Stop'
        Write-Host "PATH before scrub:"
        $env:PATH -split ';' | ForEach-Object { Write-Host "  $_" }
        $scrubbed = ($env:PATH -split ';' | Where-Object {
          $_ -notmatch '\\msys(64|2)\\' -and
          $_ -notmatch '\\Git\\(usr|mingw\d+)\\bin' -and
          $_ -notmatch '\\Git\\cmd' -and
          $_ -notmatch '\\Git\\bin' -and
          $_ -notmatch '\\cygwin\d*\\'
        }) -join ';'
        # QEMU is required for this job; ensure it stays on PATH after the scrub.
        if ($scrubbed -notmatch '(?i)\\qemu') {
          $scrubbed = 'C:\Program Files\QEMU;' + $scrubbed
        }
        Add-Content -Path $env:GITHUB_ENV -Value "PATH=$scrubbed"
        $env:PATH = $scrubbed
        Write-Host ""
        Write-Host "PATH after scrub:"
        $env:PATH -split ';' | ForEach-Object { Write-Host "  $_" }
        Write-Host ""
        $sshSrc = (Get-Command ssh).Source
        Write-Host "ssh resolves to: $sshSrc"
        if ($sshSrc -notlike 'C:\Windows\System32\OpenSSH\ssh.exe') {
          Write-Error "Expected native Windows OpenSSH; got $sshSrc"
          exit 1
        }
        # Same inventory as windows-plain-wsl2 but with QEMU binaries promoted
        # from "optional" to "required" since they are necessary here.
        $required = @('ssh','scp','ssh-keygen','sftp-server','wsl','tar','qemu-img','qemu-system-x86_64')
        $forbidden = @{
          'cygpath' = 'cygpath comes from MSYS2/Git-for-Windows/Cygwin only'
          'pacman'  = 'pacman comes from MSYS2 only'
        }
        $optional = @('bash','sh','gzip','bzip2','xz','zstd','rsync','id','make','awk','sed')

        Write-Host ""
        Write-Host "=== Required tools (must resolve) ==="
        $missingRequired = @()
        foreach ($cmd in $required) {
          $found = Get-Command $cmd -ErrorAction SilentlyContinue
          if ($found) { Write-Host ("  {0,-20} -> {1}" -f $cmd, $found.Source) }
          else { Write-Host ("  {0,-20} -> NOT FOUND" -f $cmd); $missingRequired += $cmd }
        }
        Write-Host ""
        Write-Host "=== Forbidden tools (must not resolve on plain Windows) ==="
        $foundForbidden = @()
        foreach ($cmd in $forbidden.Keys) {
          $found = Get-Command $cmd -ErrorAction SilentlyContinue
          if ($found) {
            Write-Host ("  {0,-20} -> {1}    (FORBIDDEN: {2})" -f $cmd, $found.Source, $forbidden[$cmd])
            $foundForbidden += $cmd
          } else {
            Write-Host ("  {0,-20} -> not found (good)" -f $cmd)
          }
        }
        Write-Host ""
        Write-Host "=== Optional tools (logged for context, not asserted) ==="
        foreach ($cmd in $optional) {
          $found = Get-Command $cmd -ErrorAction SilentlyContinue
          if ($found) { Write-Host ("  {0,-20} -> {1}" -f $cmd, $found.Source) }
          else { Write-Host ("  {0,-20} -> not found" -f $cmd) }
        }
        Write-Host ""
        if ($missingRequired.Count -gt 0) {
          Write-Error ("Required tools not on PATH: " + ($missingRequired -join ', '))
          exit 1
        }
        if ($foundForbidden.Count -gt 0) {
          Write-Error ("Forbidden tools still on PATH: " + ($foundForbidden -join ', ') + ". Update the scrub regex in this step.")
          exit 1
        }
    - name: Smoke test (create / start / shell / copy / mount / stop / delete)
      env:
        LIMA_HOME: ${{ runner.temp }}\lima-plain-qemu
      run: |
        $ErrorActionPreference = 'Stop'
        function Invoke-Limactl {
          & .\_output\bin\limactl.exe --debug @args
          if ($LASTEXITCODE -ne 0) { throw "limactl $($args -join ' ') exited $LASTEXITCODE" }
        }
        if (Test-Path $env:LIMA_HOME) { Remove-Item $env:LIMA_HOME -Recurse -Force }
        New-Item -ItemType Directory -Path $env:LIMA_HOME | Out-Null
        # Use the same default template that windows-qemu uses, so the only
        # axis varying between the two QEMU jobs is the host toolchain.
        Invoke-Limactl create --tty=false --name=plain --vm-type=qemu .\templates\default.yaml
        Invoke-Limactl start plain
        Invoke-Limactl shell --tty=false plain -- uname -srm

        # Reverse-sshfs round-trip: the mount-home check from
        # hack/test-mount-home.sh, but in PowerShell. Verifies the host-side
        # native sftp-server is usable to the guest via sshfs.
        $shareDir = Join-Path $env:USERPROFILE 'lima-test-tmp'
        if (Test-Path $shareDir) { Remove-Item $shareDir -Recurse -Force }
        New-Item -ItemType Directory -Path $shareDir | Out-Null
        $expected = "random-content-$(Get-Random)"
        Set-Content -Path (Join-Path $shareDir 'random') -Value $expected -NoNewline -Encoding ASCII
        # The default template uses cygpath-style mount points (/c/Users/...).
        # filepath.VolumeName-style native cygpath fallback in ioutilx produces
        # the same convention, so the guest path is deterministic regardless
        # of toolchain.
        $userProfileGuest = '/' + $env:USERPROFILE.Substring(0,1).ToLower() + ($env:USERPROFILE.Substring(2) -replace '\\','/')
        $guestRandom = "$userProfileGuest/lima-test-tmp/random"
        $got = & .\_output\bin\limactl.exe shell --tty=false plain cat $guestRandom
        if ($LASTEXITCODE -ne 0) { throw "guest cat $guestRandom failed: $LASTEXITCODE" }
        Write-Host "mount-home: expected=$expected, got=$got"
        if ($got -ne $expected) {
          throw "Reverse-sshfs round-trip failed: expected '$expected', got '$got'"
        }
        Remove-Item $shareDir -Recurse -Force

        # Plain copy round-trip via scp (independent of the mount).
        'roundtrip' | Out-File -Encoding ascii "$env:LIMA_HOME\rt.txt"
        Invoke-Limactl copy "$env:LIMA_HOME\rt.txt" plain:/tmp/rt.txt
        Invoke-Limactl shell --tty=false plain -- cat /tmp/rt.txt

        Invoke-Limactl stop plain
        Invoke-Limactl delete --force plain
    - name: Dump Lima logs on failure
      if: failure()
      env:
        LIMA_HOME: ${{ runner.temp }}\lima-plain-qemu
      run: |
        $instDir = "$env:LIMA_HOME\plain"
        if (-not (Test-Path $instDir)) {
          Write-Host "No instance directory at $instDir, nothing to dump."
          exit 0
        }
        Get-ChildItem $instDir | Format-Table Name, Length, LastWriteTime
        foreach ($name in 'ha.stdout.log','ha.stderr.log','serial.log','lima.yaml','ssh.config') {
          $p = Join-Path $instDir $name
          if (Test-Path $p) {
            Write-Host ("===== {0} =====" -f $p)
            Get-Content $p
          }
        }

  qemu:
    name: "Integration tests (QEMU, macOS host)"
    runs-on: macos-15-large  # Intel
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Unit tests
      run: go test -v ./...
    - name: Make
      run: make
    - name: "Inject `no_timer_check` to kernel cmdline"
      # workaround to https://github.com/lima-vm/lima/issues/84
      run: |
        export PATH="$PWD/_output/bin:$PATH"
        ./hack/inject-cmdline-to-template.sh _output/share/lima/templates/_images/ubuntu.yaml no_timer_check
    - name: Install
      run: sudo make install
    - name: Validate jsonschema
      run: make schema-limayaml.json
    - name: Validate templates
      # Can't validate base templates in `_default` because they have no images
      run: find -L templates -name '*.yaml' ! -path '*/_default/*' | xargs limactl validate
    - name: Install test dependencies
      # QEMU:      required by Lima itself
      # bash:      required by test-templates.sh (OS version of bash is too old)
      # coreutils: required by test-templates.sh for the "timeout" command
      # w3m :      required by test-templates.sh for port forwarding tests
      # socat:     required by test-templates.sh for port forwarding tests
      run: brew install qemu bash coreutils w3m socat
    - name: "Adjust LIMACTL_CREATE_ARGS"
      run: echo "LIMACTL_CREATE_ARGS=${LIMACTL_CREATE_ARGS} --vm-type=qemu" >>$GITHUB_ENV
    - name: Cache image used by default.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/default.yaml
    - name: "Show cache"
      run: ./hack/debug-cache.sh
    - name: "Test default.yaml"
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
      with:
        timeout_minutes: 30
        retry_on: error
        max_attempts: 3
        command: ./hack/test-templates.sh templates/default.yaml
    # GHA macOS is slow and flaky, so we only test default.yaml here.
    # Other yamls are tested on Linux instances.
    #
    - if: always()
      uses: ./.github/actions/upload_failure_logs_if_exists
    - name: "Show cache"
      if: always()
      run: ./hack/debug-cache.sh

  # Non-default templates are tested on Linux instances of GHA,
  # as they seem more stable than macOS instances.
  qemu-linux:
    name: "Integration tests (QEMU, Linux host)"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # Most templates use 9p as the mount type
        template:
        - alpine.yaml
        - debian.yaml  # reverse-sshfs
        - fedora.yaml
        - archlinux.yaml
        - opensuse.yaml
        - docker.yaml
        - ../hack/test-templates/alpine-iso-9p-writable.yaml  # Covers alpine-iso.yaml
        - ../hack/test-templates/net-user-v2.yaml
        - ../hack/test-templates/test-misc.yaml  # TODO: merge net-user-v2 into test-misc
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: Install
      run: sudo make install
    - name: Cache image used by templates/${{ matrix.template }}
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/${{ matrix.template }}
    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo ./hack/install-qemu.sh
        sudo apt-get install -y --no-install-recommends socat w3m
    - name: Install ansible-playbook
      run: |
        sudo apt-get install -y --no-install-recommends ansible
      if: matrix.template == '../hack/test-templates/test-misc.yaml'
    - name: "Show cache"
      run: ./hack/debug-cache.sh
    - name: "Test"
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
      with:
        timeout_minutes: 30
        retry_on: error
        max_attempts: 3
        command: ./hack/test-templates.sh templates/${{ matrix.template }}
    - if: always()
      uses: ./.github/actions/upload_failure_logs_if_exists
      with:
        suffix: ${{ matrix.template }}
    - name: "Show cache"
      run: ./hack/debug-cache.sh

  bats:
    name: "Integration tests (BATS)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        # BATS tests don't expect lima version warnings like:
        # msg="treating lima version \"ea336ae\" from \"/Users/runner/.lima-bats/dummy/lima-version\" as very latest release"
        fetch-depth: 0
        submodules: true
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: Install
      run: sudo make install
    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo ./hack/install-qemu.sh
    - name: Cache image used by templates/default.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/default.yaml
    - name: "Run BATS integration tests"
      run: make bats
      env:
        # The url-github.bats tests makes GitHub API requests
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Cache image used by templates/k8s.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/k8s.yaml
    - name: "Run BATS k8s tests"
      run: ./hack/bats/lib/bats-core/bin/bats --timing ./hack/bats/extras/k8s.bats
      env:
        LIMA_BATS_ALL_TESTS_RETRIES: 3
    - name: Cache image used by templates/freebsd.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/freebsd.yaml
    - name: "Run BATS freebsd tests"
      run: |
        set -eux -o pipefail
        # xorriso is required for creating Joliet filesystem
        sudo apt-get install -y xorriso
        ./hack/bats/lib/bats-core/bin/bats --timing ./hack/bats/extras/freebsd.bats

  colima:
    name: "Colima tests (QEMU, Linux host)"
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        # fetch-depth is set to 0 to let `limactl --version` print semver-ish version
        # fetch-depth: 0 is required for Colima integration test because Colima
        # checks Lima's version and requires proper semantic version format
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}
        submodules: true
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: Install
      run: sudo make install
    - name: Install colima
      id: install-colima
      run: |
        git clone https://github.com/abiosoft/colima
        cd colima
        latest="$(git tag --sort=-v:refname | head -n1)"
        git checkout "$latest"
        make
        sudo make install
        echo "version=$latest" >>$GITHUB_OUTPUT
    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo ./hack/install-qemu.sh
    - name: Cache colima
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: ~/.cache/colima
        key: colima-${{ steps.install-colima.outputs.version }}
        lookup-only: true
    - name: Run BATS colima tests
      run: ./hack/bats/lib/bats-core/bin/bats --timing ./hack/bats/extras/colima.bats

  vmnet:
    name: "VMNet tests (QEMU)"
    runs-on: macos-15-large  # Intel
    timeout-minutes: 120
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: "Inject `no_timer_check` to kernel cmdline"
      # workaround to https://github.com/lima-vm/lima/issues/84
      run: |
        export PATH="$PWD/_output/bin:$PATH"
        ./hack/inject-cmdline-to-template.sh _output/share/lima/templates/_images/ubuntu.yaml no_timer_check
    - name: Install
      run: sudo make install
    - name: "Adjust LIMACTL_CREATE_ARGS"
      run: echo "LIMACTL_CREATE_ARGS=${LIMACTL_CREATE_ARGS} --vm-type=qemu --network=lima:shared" >>$GITHUB_ENV
    - name: Cache image used by default .yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/default.yaml
    - name: Install test dependencies
      run: brew install qemu bash coreutils w3m socat
    - name: Install socket_vmnet
      env:
        SOCKET_VMNET_VERSION: v1.2.2
      run: |
        (
          cd ~
          git clone https://github.com/lima-vm/socket_vmnet
          cd socket_vmnet
          git checkout $SOCKET_VMNET_VERSION
          sudo git config --global --add safe.directory /Users/runner/socket_vmnet
          sudo make PREFIX=/opt/socket_vmnet install
        )
        limactl sudoers | sudo tee /etc/sudoers.d/lima
    - name: Unit test (pkg/networks) with socket_vmnet
      # Set -count=1 to disable cache
      run: go test -v -count=1 ./pkg/networks/...
    - name: Test socket_vmnet
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
      with:
        timeout_minutes: 30
        retry_on: error
        max_attempts: 3
        command: ./hack/test-templates.sh templates/default.yaml
    - if: always()
      uses: ./.github/actions/upload_failure_logs_if_exists

  upgrade:
    name: "Upgrade tests (QEMU, macOS host)"
    runs-on: macos-15-large  # Intel
    timeout-minutes: 120
    strategy:
      matrix:
        oldver: ["v0.15.1"]  # The default VM type was always QEMU until Lima v1.0
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - name: Fetch homebrew-core commit messages
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        # needed by ./hack/brew-install-version.sh
        repository: homebrew/homebrew-core
        path: homebrew-core
        fetch-depth: 0
        filter: tree:0
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Cache image used by ${{ matrix.oldver }}/examples/ubuntu-lts.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: https://raw.githubusercontent.com/lima-vm/lima/${{ matrix.oldver }}/examples/ubuntu-lts.yaml
    - name: Install test dependencies
      run: |
        brew install bash coreutils
        # QEMU 9.1.0 seems to break on GitHub runners, both on Monterey and Ventura
        # We revert back to 8.2.1, which seems to work fine
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "nobody@localhost"
        ./hack/brew-install-version.sh qemu 8.2.1
    - name: Test
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
      with:
        timeout_minutes: 30
        retry_on: error
        max_attempts: 3
        command: ./hack/test-upgrade.sh ${{ matrix.oldver }} ${{ github.sha }}
    - if: always()
      uses: ./.github/actions/upload_failure_logs_if_exists

  vz:
    name: "Integration tests (vz)"
    runs-on: macos-15-large  # Intel
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template:
        - default.yaml
    steps:
    - name: "Adjust LIMACTL_CREATE_ARGS"
      # --cpus=1 is needed for running vz on GHA: https://github.com/lima-vm/lima/pull/1511#issuecomment-1574937888
      run: echo "LIMACTL_CREATE_ARGS=${LIMACTL_CREATE_ARGS} --cpus 1 --memory 1" >>$GITHUB_ENV
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: Install
      run: sudo make install
    - name: Cache image used by templates/${{ matrix.template }}
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/${{ matrix.template }}
    - name: Install test dependencies
      run: brew install bash coreutils w3m socat
    - name: Uninstall qemu
      run: brew uninstall --ignore-dependencies --force qemu
    - name: Test
      run: ./hack/test-templates.sh templates/${{ matrix.template }}
    - if: failure()
      uses: ./.github/actions/upload_failure_logs_if_exists
      with:
        suffix: ${{ matrix.template }}

  # gomodjail is a library sandbox for Go
  # https://github.com/AkihiroSuda/gomodjail
  #
  # This is an early experiment.
  # CI failures that only occurs with gomodjail shall not block merging PRs.
  gomodjail:
    name: "gomodjail (experimental; failures shall not block merging PRs)"
    runs-on: macos-15-large  # Intel
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Install gomodjail
      run: |
        set -eux -o pipefail
        git clone https://github.com/AkihiroSuda/gomodjail
        cd gomodjail
        make binaries install
    - name: Install Lima
      # gomodjail depends on symbols
      run: |
        make KEEP_SYMBOLS=1 binaries
        sudo make install
    - name: Cache image used by templates/default.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/default.yaml
    - name: Smoke test
      run: gomodjail run --go-mod=./go.mod -- limactl start --tty=false

  cross:
    name: "Cross-compile (NetBSD, DragonFlyBSD)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - run: GOOS=netbsd go build ./...
    - run: GOOS=dragonfly go build ./...

  qemu-linux-old:
    name: "Smoke tests (QEMU, old Linux host)"
    runs-on: ubuntu-22.04  # QEMU 6.2
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: Install
      run: sudo make install
    - name: Cache image used by templates/default.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/default.yaml
    - name: Install test dependencies
      run: |
        sudo apt-get update
        sudo ./hack/install-qemu.sh
    - name: Smoke test
      run: limactl start --tty=false
