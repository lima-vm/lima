name: test

on:
  push:
    branches:
    - master
    - 'release/**'
    paths-ignore:
    - "docs/**"
    - "website/**"
    - "**.md"
  pull_request:
    paths-ignore:
    - "docs/**"
    - "website/**"
    - "**.md"
env:
  LIMACTL_CREATE_ARGS: ""
  GOTOOLCHAIN: local

permissions:
  contents: read

jobs:
  vz:
    name: "Integration tests (vz) (${{ matrix.containerd_commit }})"
    runs-on: macos-15-large  # Intel
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
        - containerd_commit: "f078cebbd"
        - containerd_commit: "f078cebbd~1"
    steps:
    - name: "Adjust LIMACTL_CREATE_ARGS"
      # --cpus=1 is needed for running vz on GHA: https://github.com/lima-vm/lima/pull/1511#issuecomment-1574937888
      run: echo "LIMACTL_CREATE_ARGS=${LIMACTL_CREATE_ARGS} --cpus 1 --memory 1" >>$GITHUB_ENV
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: stable
        cache: false
    - name: Make
      run: make
    - name: Install
      run: sudo make install
    - name: "Cross-compile containerd"
      env:
        CONTAINERD_COMMIT: ${{ matrix.containerd_commit }}
      run: |
        set -eux
        git clone https://github.com/containerd/containerd.git
        cd containerd
        git checkout "${CONTAINERD_COMMIT}"
        GOOS=linux GOARCH=amd64 CGO_ENABLED=0 make \
          bin/containerd bin/containerd-shim-runc-v2 bin/ctr
        file bin/containerd bin/containerd-shim-runc-v2 bin/ctr
    - name: "Patch nerdctl-full archive"
      run: |
        set -eux
        curl -fsSL -o /tmp/nerdctl-full-orig.tar.gz \
          "https://github.com/containerd/nerdctl/releases/download/v2.3.1/nerdctl-full-2.3.1-linux-amd64.tar.gz"
        mkdir -p /tmp/nerdctl-full
        tar -xzf /tmp/nerdctl-full-orig.tar.gz -C /tmp/nerdctl-full
        cp "containerd/bin/containerd" /tmp/nerdctl-full/bin/containerd
        cp "containerd/bin/containerd-shim-runc-v2" /tmp/nerdctl-full/bin/containerd-shim-runc-v2
        cp "containerd/bin/ctr" /tmp/nerdctl-full/bin/ctr
        # Sanity-check that the original layout (with bin/nerdctl) is preserved.
        # Lima's containerd install script runs `tar Cxaf nerdctl-full.tgz bin/nerdctl`
        # inside the guest and requires an exact entry-name match.
        test -f /tmp/nerdctl-full/bin/nerdctl
        # Pack from inside the directory so entries are `bin/nerdctl` (not `./bin/nerdctl`).
        # BSD tar on macOS prefixes `./` when given `-C dir .`, which breaks GNU tar's
        # exact name matching inside the Linux guest.
        ( cd /tmp/nerdctl-full && tar -czf "${HOME}/nerdctl-full-patched.tar.gz" bin lib libexec share )
        echo "Patched archive: $(du -h "${HOME}/nerdctl-full-patched.tar.gz" | cut -f1)"
        echo "First entries in patched archive:"
        tar -tzf "${HOME}/nerdctl-full-patched.tar.gz" | head -5
    - name: "Update template to use patched archive"
      run: |
        set -eux
        yq -i '.containerd.archives = [{"location": strenv(HOME) + "/nerdctl-full-patched.tar.gz", "arch": "x86_64"}]' templates/default.yaml
        # Re-emit through limactl's canonical YAML writer so the indent matches
        # the indentless sequence style expected by test-templates.sh.
        # (`limactl edit` cannot be used here because it rejects templates with a `base` field.)
        tmp=$(mktemp)
        echo -n "base: $PWD/templates/default.yaml" | limactl tmpl copy --embed - "$tmp"
        mv "$tmp" templates/default.yaml
        grep -A3 'archives' templates/default.yaml
    - name: Cache image used by templates/default.yaml
      uses: ./.github/actions/setup_cache_for_template
      with:
        template: templates/default.yaml
    - name: Install test dependencies
      run: brew install bash coreutils w3m socat
    - name: Uninstall qemu
      run: brew uninstall --ignore-dependencies --force qemu
    - name: "Test"
      run: ./hack/test-templates.sh templates/default.yaml
    - name: "Diagnostics on failure"
      if: failure()
      run: |
        set -x
        limactl shell default -- containerd --version || true
        limactl shell default -- systemctl --user status containerd || true
        limactl shell default -- journalctl --user -u containerd --no-pager -n 50 || true
    - if: failure()
      uses: ./.github/actions/upload_failure_logs_if_exists
      with:
        suffix: bisect-${{ matrix.containerd_commit }}
