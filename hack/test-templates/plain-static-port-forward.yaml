images:
- location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-amd64.img"
  arch: "x86_64"

plain: true

provision:
- mode: system
  script: |
    apt-get update
    apt-get install -y nginx
    systemctl enable nginx
    systemctl start nginx

portForwards:
- guestPort: 80
  hostPort: 9090
  static: true
- guestPort: 9080
  hostPort: 9080
  static: false
